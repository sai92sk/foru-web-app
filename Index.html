<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Use your actual hosted image URL here */
            background-image: url('1782149856600.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            padding: 24px;
            position: relative;
        }
        /* Dark overlay to balance contrast and make the text pop */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10, 11, 14, 0.75);
            z-index: 1;
        }
        .container { 
            max-width: 850px; 
            z-index: 2;
            position: relative;
        }
        h1 {
            font-size: clamp(1.8rem, 4.5vw, 2.8rem);
            line-height: 1.4;
            letter-spacing: -0.02em;
            font-weight: 700;
            color: #ffffff;
        }
        .subtitle {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            margin-top: 1rem;
            color: #e5e7eb;
            font-weight: 500;
        }
        .status {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            margin-top: 1.5rem;
            color: #eab308; /* Premium gold accent */
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Busy engineering ideal societies for you.</h1>
        <div class="subtitle">Website is work in progress</div>
        <div class="status">Coming soon</div>
    </div>
</body>
</html>
